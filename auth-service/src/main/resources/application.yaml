server:
  port: 8082
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 20

spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ─── Redis (captcha bypass tokens) ────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  # ─── Jackson ──────────────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# ─── Google reCAPTCHA v2 ──────────────────────────────────────────────────
captcha:
  secret-key: ${CAPTCHA_SECRET_KEY:6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe}  # Google test key
  site-key:   ${CAPTCHA_SITE_KEY:6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI}    # Google test key
  verify-url: https://www.google.com/recaptcha/api/siteverify
  bypass-token-ttl-seconds: 300   # 5 minutes

# ─── Threat-Aware Behavior ────────────────────────────────────────────────
threat:
  monitoring:
    log-monitored-requests: true
    alert-on-high-threat: true

# ─── Actuator ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# ─── Logging ──────────────────────────────────────────────────────────────
logging:
  level:
    com.threatprotection: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n"