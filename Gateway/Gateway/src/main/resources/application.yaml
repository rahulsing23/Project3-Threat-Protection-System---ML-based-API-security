server:
  port: 8080
  shutdown: graceful
  netty:
    connection-timeout: 5s
    idle-timeout: 60s

spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ─── Redis ────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:admin}
      timeout: 2000ms
      connect-timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 1000ms
        shutdown-timeout: 100ms

  # ─── Spring Cloud Gateway Routes ─────────────────────────────────────────
  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s
        pool:
          max-connections: 500

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: ${ALLOWED_ORIGINS:*}
            allowedMethods: GET,POST,PUT,DELETE,OPTIONS,PATCH
            allowedHeaders: "*"
            exposedHeaders: X-Request-ID,X-Threat-Level,X-Threat-Probability
            maxAge: 3600

      routes:
        # ── Auth Service Routes ────────────────────────────────────────────
        - id: auth-login
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/auth/**
          filters:
            - name: ThreatProtectionFilter
            - name: CircuitBreaker
              args:
                name: auth-service-cb
                fallbackUri: forward:/fallback/service-unavailable
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms

        - id: api-routes
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/**
          filters:
            - name: ThreatProtectionFilter
            - name: CircuitBreaker
              args:
                name: api-cb
                fallbackUri: forward:/fallback/service-unavailable

        # ── Captcha Routes (no threat filter - already verified) ───────────
        - id: captcha-routes
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/captcha/**

      # ── Circuit Breaker Config ─────────────────────────────────────────
      resilience4j:
        circuitbreaker:
          instances:
            auth-service-cb:
              slidingWindowSize: 10
              permittedNumberOfCallsInHalfOpenState: 3
              slidingWindowType: COUNT_BASED
              minimumNumberOfCalls: 5
              waitDurationInOpenState: 10s
              failureRateThreshold: 50
            api-cb:
              slidingWindowSize: 20
              minimumNumberOfCalls: 10
              failureRateThreshold: 60

# ─── Threat Service Client ─────────────────────────────────────────────────
threat-service:
  url: ${THREAT_SERVICE_URL:http://localhost:8081}
  timeout-ms: 5000
  fallback-action: ALLOW    # ALLOW (fail-open) or BLOCK (fail-closed)

# ─── Feature Extraction Config ─────────────────────────────────────────────
feature-extraction:
  burst-window-seconds: 10
  unusual-hour-start: 1   # 1AM
  unusual-hour-end: 5     # 5AM
  max-burst-threshold: 1000

# ─── Redis TTLs (seconds) ──────────────────────────────────────────────────
redis:
  ttl:
    request-counter: 3600       # 1 hour
    burst-counter: 10           # 10 seconds (burst window)
    failed-login: 1800          # 30 min
    error-counter: 300          # 5 min sliding window
    bypass-token: 300           # 5 min captcha bypass

# ─── Actuator ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 0.1

# ─── Logging ──────────────────────────────────────────────────────────────
logging:
  level:
    com.threatprotection: ${LOG_LEVEL:INFO}
    org.springframework.cloud.gateway: WARN
    org.springframework.data.redis: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n"