server:
  port: 8081
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 20
    connection-timeout: 5000
    max-connections: 8192
    accept-count: 100

spring:
  application:
    name: threat-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ─── Database ─────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/threat_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ThreatHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  # ─── JPA ──────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # ─── Redis ────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 1000ms

  # ─── Jackson ──────────────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# ─── ML Service ───────────────────────────────────────────────────────────
ml-service:
  url: ${ML_SERVICE_URL:http://localhost:8090}
  timeout-ms: 5000
  connect-timeout-ms: 2000

# ─── Threat Business Rules ────────────────────────────────────────────────
threat:
  rules:
    extreme-burst-threshold: 1000       # req/10s → instant BLOCK
    failed-login-captcha-threshold: 5   # failed logins → force CAPTCHA
    hourly-threat-escalation-count: 10  # flags in 1 hour → escalate

# ─── Resilience4j ─────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      ml-service:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      ml-service:
        max-attempts: 2
        wait-duration: 200ms

# ─── Actuator ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# ─── Scheduler ────────────────────────────────────────────────────────────
scheduler:
  blacklist-sync-cron: "0 */5 * * * *"   # Sync blacklist to Redis every 5 min
  threat-stats-cron: "0 0 * * * *"       # Hourly stats aggregation

# ─── Logging ──────────────────────────────────────────────────────────────
logging:
  level:
    com.threatprotection: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN
    org.springframework.data.redis: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n"